<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>BIM Multi-Filtrering v2.4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --ink:       #e6edf3;
      --muted:     #7d8590;
      --blue:      #58a6ff;
      --blue-dim:  #0d2044;
      --green:     #3fb950;
      --red:       #f85149;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-title { flex: 1; }
    .header-title h1 { font-size: 16px; font-weight: 800; color: var(--ink); }
    .header-title p { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    .btn { font-family: var(--sans); font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #000; }
    .btn-ghost   { background: var(--surface2); color: var(--ink); border: 1px solid var(--border); }
    .btn-danger  { background: #21262d; color: var(--red); border: 1px solid #3a1c1c; }

    #statusBar { font-family: var(--mono); font-size: 11px; padding: 6px 16px; background: var(--blue-dim); color: var(--blue); border-bottom: 1px solid #1a3a5c; }
    #statusBar.ok { background: #1a3a22; color: var(--green); }
    #statusBar.error { background: #3a1212; color: var(--red); }

    #controlBar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 15px; align-items: center; }
    .select-group { display: flex; align-items: center; gap: 8px; flex: 1; }
    label { font-size: 11px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    select { font-family: var(--mono); font-size: 12px; background: var(--surface2); color: var(--ink); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; width: 100%; }

    main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    
    .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; }
    @media (max-width: 600px) { .filter-grid { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .panel h3 { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
    
    .filter-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; height: 180px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .filter-item { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; cursor: pointer; padding: 4px; }
    .filter-item input { cursor: pointer; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>BIM Multi-Filtrering</h1>
    <p>Kombiner filtre for MMI, Underdisiplin, PNS og Bruksstatus (Inkludert Proxy-fiks)</p>
  </div>
  <button class="btn btn-ghost" id="btnLoad" disabled>Hent modeller</button>
  <button class="btn btn-primary" id="btnFilter" disabled>🔍 Filtrer i 3D</button>
  <button class="btn btn-danger" id="btnReset" disabled>↺ Vis alle</button>
</header>

<div id="statusBar">Kobler til Trimble Connect...</div>

<div id="controlBar">
  <div class="select-group">
    <label>Velg kilde/modell:</label>
    <select id="modelSelect" disabled><option value="">– Laster... –</option></select>
  </div>
</div>

<main id="mainContent">
  <div class="filter-grid" id="filterGrid" style="display: none;">
    <div class="panel">
      <h3>Del 1: MMI-nivå</h3>
      <div class="filter-box" id="box_mmi"></div>
    </div>
    
    <div class="panel">
      <h3>Del 2: Fagområde (Underdisiplin)</h3>
      <div class="filter-box" id="box_underdisiplin"></div>
    </div>
    
    <div class="panel">
      <h3>Del 3: PNS Kode</h3>
      <div class="filter-box" id="box_pns"></div>
    </div>
    
    <div class="panel">
      <h3>Del 4: Bruksstatus</h3>
      <div class="filter-box" id="box_bruksstatus"></div>
    </div>
  </div>
  
  <div class="empty" id="emptyState">Last inn modeller og analyser egenskaper for å starte.</div>
</main>

<script>
let API = null;
let allModels = [];
let modelObjectsData = []; 

const PROP_KEYS = {
  mmi: "MMI",
  underdisiplin: "Underdisiplin",
  pns: "PNS Kode",
  bruksstatus: "Bruksstatus"
};

const $ = id => document.getElementById(id);
const setStatus = (m, c='') => { $('statusBar').textContent = m; $('statusBar').className = c; };
const lastPathPart = (v) => (v || '').split('/').pop().split('\\').pop();

async function connect(){
  try {
    API = await window.TrimbleConnectWorkspace.connect(window.parent);
    $('btnLoad').disabled = false;
    setStatus('✅ Tilkoblet Trimble Connect.', 'ok');
  } catch(e) { setStatus('❌ Kunne ikke koble til API.', 'error'); }
}

async function loadModels(){
  if (!API) return;
  setStatus('⏳ Henter modellnavn og 3D-objekter...');
  try {
    const nameMap = new Map();
    try {
      const resModels = await API.models.getModels();
      const list = Array.isArray(resModels) ? resModels : (resModels?.models || resModels?.items || []);
      list.forEach(m => {
        const id = m.id || m.modelId;
        const fn = [m.name, m.fileName, m.filename].find(v => /\.ifc/i.test(v)) || m.name;
        if (id && fn) nameMap.set(id, lastPathPart(fn));
      });
    } catch(e) { console.warn("Kunne ikke hente filnavn:", e); }

    const objs = await API.viewer.getObjects();
    
    allModels = (objs || []).map(m => {
      const mid = m.modelId || m.modelid;
      return {
        id: mid,
        name: nameMap.get(mid) || m.modelName || m.name || 'Navnløs modell',
        // Vi lagrer hele objekt-strukturen slik at vi kan hente ut eventuelle "children" (undernoder) senere
        rawObjects: m.objects || [],
        objectIds: (m.objects || []).map(o => o.id || o.objectRuntimeId).filter(id => id != null)
      };
    }).filter(m => m.objectIds.length > 0);

    if (allModels.length === 0) {
      setStatus('⚠️ Ingen objekter funnet i modellene.', 'error');
      return;
    }

    let optionsHtml = `
      <option value="ALL_MODELS">🌍 Alle modeller (${allModels.reduce((acc, m) => acc + m.objectIds.length, 0)} obj)</option>
      <option value="SELECTED_OBJECTS">🎯 Valgte objekter (krever markering i 3D)</option>
    `;
    allModels.forEach(m => {
      optionsHtml += `<option value="${m.id}">📦 ${m.name} (${m.objectIds.length} obj)</option>`;
    });

    $('modelSelect').innerHTML = optionsHtml;
    $('modelSelect').disabled = false;
    
    await analyzeModelProperties();
  } catch(e) { setStatus('❌ Feil ved henting av modeller: ' + e.message, 'error'); }
}

// Hjelpefunksjon som henter ut absolutt alle under-IDer (children/geometri) fra et objekt
function getAllRuntimeIds(obj) {
  let ids = [];
  const mainId = obj.id || obj.objectRuntimeId;
  if (mainId != null) ids.push(mainId);
  
  if (obj.objects && Array.isArray(obj.objects)) {
    obj.objects.forEach(child => {
      ids = ids.concat(getAllRuntimeIds(child));
    });
  }
  return ids;
}

async function analyzeModelProperties() {
  const mode = $('modelSelect').value;
  if (!mode) return;

  modelObjectsData = [];
  const uniqueSets = { mmi: new Set(), underdisiplin: new Set(), pns: new Set(), bruksstatus: new Set() };
  let chunksToProcess = [];

  setStatus('⏳ Forbereder analyse...');

  if (mode === "SELECTED_OBJECTS") {
    const selection = await API.viewer.getSelection();
    if (!selection || selection.length === 0) {
      setStatus('⚠️ Ingen objekter er valgt i 3D-vieweren.', 'error');
      $('filterGrid').style.display = 'none';
      $('emptyState').style.display = 'block';
      $('emptyState').textContent = 'Ingen objekter er valgt i 3D-vieweren. Marker objekter i modellen og last inn på nytt.';
      return;
    }
    selection.forEach(sel => {
      const mid = sel.modelId || sel.modelid;
      const ids = (sel.objectIds || sel.objectRuntimeIds || []);
      if (mid && ids.length > 0) {
        // For valgte objekter finner vi også eventuelle under-objekter hvis vi har dem lagret
        let allExpandedIds = [...ids];
        const targetModel = allModels.find(m => m.id === mid);
        if (targetModel) {
          targetModel.rawObjects.forEach(rawO => {
            const rId = rawO.id || rawO.objectRuntimeId;
            if (ids.includes(rId)) {
              allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO));
            }
          });
        }
        // Fjern duplikater
        allExpandedIds = Array.from(new Set(allExpandedIds));
        chunksToProcess.push({ modelId: mid, objectIds: allExpandedIds });
      }
    });
  } else if (mode === "ALL_MODELS") {
    allModels.forEach(m => {
      // PROXY FIKS: Hent absolutt alle ID-er, inkludert dype geometrinoder/children
      let allExpandedIds = [];
      m.rawObjects.forEach(rawO => {
        allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO));
      });
      allExpandedIds = Array.from(new Set(allExpandedIds));
      chunksToProcess.push({ modelId: m.id, objectIds: allExpandedIds });
    });
  } else {
    const targetModel = allModels.find(m => m.id === mode);
    if (targetModel) {
      let allExpandedIds = [];
      targetModel.rawObjects.forEach(rawO => {
        allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO));
      });
      allExpandedIds = Array.from(new Set(allExpandedIds));
      chunksToProcess.push({ modelId: targetModel.id, objectIds: allExpandedIds });
    }
  }

  const CHUNK_SIZE = 200;
  let totalObjectsCount = chunksToProcess.reduce((acc, c) => acc + c.objectIds.length, 0);
  let processedCount = 0;

  // For å passe på at egenskaper fra "parent" arves ned til geometri-children, mapper vi relasjoner
  for (const chunkGroup of chunksToProcess) {
    const mid = chunkGroup.modelId;
    const ids = chunkGroup.objectIds;

    // Bygg et raskt oppslagskart for å finne ut hvilke sub-IDer som hører til hvilket hovedobjekt
    const childToParentMap = new Map();
    const targetModel = allModels.find(m => m.id === mid);
    if (targetModel) {
      targetModel.rawObjects.forEach(rawO => {
        const parentId = rawO.id || rawO.objectRuntimeId;
        const allSubIds = getAllRuntimeIds(rawO);
        allSubIds.forEach(subId => {
          if (subId !== parentId) childToParentMap.set(subId, parentId);
        });
      });
    }

    // Midlertidig lagring for å fylle inn egenskaper på undernoder etterpå
    const tempObjectsData = [];

    for (let i = 0; i < ids.length; i += CHUNK_SIZE) {
      const currentBatch = ids.slice(i, i + CHUNK_SIZE);
      const propsArr = await API.viewer.getObjectProperties(mid, currentBatch);
      
      propsArr.forEach(o => {
        const currentId = o.id || o.objectRuntimeId;
        const objData = {
          modelId: mid,
          runtimeId: currentId,
          mmi: "",
          underdisiplin: "",
          pns: "",
          bruksstatus: ""
        };
        
        (o.properties || []).forEach(g => {
          (g.properties || []).forEach(p => {
            const val = p.value ? p.value.toString().trim() : "";
            if (!val) return;

            if (p.name === PROP_KEYS.mmi) objData.mmi = val;
            if (p.name === PROP_KEYS.underdisiplin) objData.underdisiplin = val;
            if (p.name === PROP_KEYS.pns) objData.pns = val;
            if (p.name === PROP_KEYS.bruksstatus) objData.bruksstatus = val;
          });
        });

        tempObjectsData.push(objData);
      });

      processedCount += currentBatch.length;
      setStatus(`⏳ Skanner egenskaper... ${processedCount} / ${totalObjectsCount}`);
    }

    // ARV-LOGIKK: Hvis en undernode (geometri) mangler egenskaper, lar vi den arve fra sitt hovedobjekt (parent)
    const parentLookup = new Map(tempObjectsData.map(d => [d.runtimeId, d]));
    
    tempObjectsData.forEach(obj => {
      let currentObj = obj;
      let depth = 0;
      
      // Hvis noden mangler data og har en forelder, sjekk forelderen
      while ((!currentObj.mmi && !currentObj.underdisiplin && !currentObj.pns && !currentObj.bruksstatus) && depth < 5) {
        const parentId = childToParentMap.get(currentObj.runtimeId);
        if (parentId && parentLookup.has(parentId)) {
          currentObj = parentLookup.get(parentId);
        } else {
          break;
        }
        depth++;
      }

      // Sett fallback til "Mangler verdi" hvis ingen data ble funnet i treet
      obj.mmi = obj.mmi || currentObj.mmi || "Mangler verdi";
      obj.underdisiplin = obj.underdisiplin || currentObj.underdisiplin || "Mangler verdi";
      obj.pns = obj.pns || currentObj.pns || "Mangler verdi";
      obj.bruksstatus = obj.bruksstatus || currentObj.bruksstatus || "Mangler verdi";

      // Legg til de endelige verdiene i de unike settene for UI
      uniqueSets.mmi.add(obj.mmi);
      uniqueSets.underdisiplin.add(obj.underdisiplin);
      uniqueSets.pns.add(obj.pns);
      uniqueSets.bruksstatus.add(obj.bruksstatus);

      modelObjectsData.push(obj);
    });
  }

  renderFilterBox('box_mmi', Array.from(uniqueSets.mmi).sort(), 'mmi');
  renderFilterBox('box_underdisiplin', Array.from(uniqueSets.underdisiplin).sort(), 'underdisiplin');
  renderFilterBox('box_pns', Array.from(uniqueSets.pns).sort(), 'pns');
  renderFilterBox('box_bruksstatus', Array.from(uniqueSets.bruksstatus).sort(), 'bruksstatus');
  
  $('filterGrid').style.display = 'grid';
  $('emptyState').style.display = 'none';
  $('btnFilter').disabled = false;
  $('btnReset').disabled = false;
  setStatus(`✅ Analyse ferdig. Hentet data fra ${modelObjectsData.length} geometri-noder.`, 'ok');
}

function renderFilterBox(elementId, values, categoryKey) {
  const box = $(elementId);
  if(values.length === 0) {
    box.innerHTML = '<div style="color: var(--muted); font-size: 11px; padding:4px;">Ingen verdier funnet</div>';
    return;
  }

  box.innerHTML = values.map(val => `
    <label class="filter-item">
      <input type="checkbox" value="${val}" data-cat="${categoryKey}" class="filter-checkbox">
      <span>${val}</span>
    </label>
  `).join('');
}

async function executeFilter() {
  if (!API || !modelObjectsData.length) return;
  
  const activeFilters = { mmi: new Set(), underdisiplin: new Set(), pns: new Set(), bruksstatus: new Set() };
  document.querySelectorAll('.filter-checkbox:checked').forEach(cb => {
    const cat = cb.getAttribute('data-cat');
    activeFilters[cat].add(cb.value);
  });

  const visibilityMap = {};

  modelObjectsData.forEach(obj => {
    if (!visibilityMap[obj.modelId]) {
      visibilityMap[obj.modelId] = { show: [], hide: [] };
    }

    const matchMMI = activeFilters.mmi.size === 0 || activeFilters.mmi.has(obj.mmi);
    const matchUnder = activeFilters.underdisiplin.size === 0 || activeFilters.underdisiplin.has(obj.underdisiplin);
    const matchPNS = activeFilters.pns.size === 0 || activeFilters.pns.has(obj.pns);
    const matchStatus = activeFilters.bruksstatus.size === 0 || activeFilters.bruksstatus.has(obj.bruksstatus);

    if (matchMMI && matchUnder && matchPNS && matchStatus) {
      visibilityMap[obj.modelId].show.push(obj.runtimeId);
    } else {
      visibilityMap[obj.modelId].hide.push(obj.runtimeId);
    }
  });

  try {
    setStatus('⏳ Oppdaterer 3D-visning...');

    let hiddenTotal = 0;
    let shownTotal = 0;

    for (const mid of Object.keys(visibilityMap)) {
      const { show, hide } = visibilityMap[mid];

      if (hide && hide.length > 0) {
        const targetIds = { modelObjectIds: [{ modelId: mid, objectRuntimeIds: hide }] };
        
        if(API.viewer.setObjectState) {
          await API.viewer.setObjectState(targetIds, { hidden: true, visibility: "hidden", opacity: 0 });
        }
        if(API.viewer.setVisibility) {
          try { await API.viewer.setVisibility(targetIds, false); } catch(e){}
        }
        hiddenTotal += hide.length;
      }
      
      if (show && show.length > 0) {
        const targetIds = { modelObjectIds: [{ modelId: mid, objectRuntimeIds: show }] };
        
        if(API.viewer.setObjectState) {
          await API.viewer.setObjectState(targetIds, { hidden: false, visibility: "visible", opacity: 255 });
        }
        if(API.viewer.setVisibility) {
          try { await API.viewer.setVisibility(targetIds, true); } catch(e){}
        }
        shownTotal += show.length;
      }
    }

    if (API.viewer.refresh) { try { await API.viewer.refresh(); } catch(e){} }
    if (API.viewer.redraw) { try { await API.viewer.redraw(); } catch(e){} }

    setStatus(`✅ Filtrering fullført. Viser ${shownTotal} noder, skjulte ${hiddenTotal}.`, 'ok');
  } catch (e) {
    setStatus('❌ Feil under filtrering: ' + e.message, 'error');
  }
}

async function resetFilter() {
  if (!API || !modelObjectsData.length) return;

  try {
    setStatus('⏳ Nullstiller visning...');
    
    const modelsToReset = {};
    modelObjectsData.forEach(obj => {
      if (!modelsToReset[obj.modelId]) modelsToReset[obj.modelId] = [];
      modelsToReset[obj.modelId].push(obj.runtimeId);
    });

    for (const mid of Object.keys(modelsToReset)) {
      if (modelsToReset[mid].length > 0) {
        const targetIds = { modelObjectIds: [{ modelId: mid, objectRuntimeIds: modelsToReset[mid] }] };
        
        if (API.viewer.setObjectState) {
          await API.viewer.setObjectState(targetIds, { hidden: false, visibility: "visible", opacity: 255, color: "reset" });
        }
        if (API.viewer.setVisibility) {
          try { await API.viewer.setVisibility(targetIds, true); } catch(e){}
        }
      }
    }

    if (API.viewer.refresh) { try { await API.viewer.refresh(); } catch(e){} }

    document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
    setStatus('✅ Filter nullstilt. Alle objekter er synlige.', 'ok');
  } catch (e) {
    setStatus('❌ Feil ved nullstilling: ' + e.message, 'error');
  }
}

$('btnLoad').onclick = loadModels;
$('modelSelect').onchange = analyzeModelProperties;
$('btnFilter').onclick = executeFilter;
$('btnReset').onclick = resetFilter;

connect();
</script>
</body>
</html>
