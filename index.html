<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>BIM Avansert Filtrering v4.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --ink:       #e6edf3;
      --muted:     #7d8590;
      --blue:      #58a6ff;
      --blue-dim:  #0d2044;
      --green:     #3fb950;
      --red:       #f85149;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-title { flex: 1; }
    .header-title h1 { font-size: 16px; font-weight: 800; color: var(--ink); }
    .header-title p { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    .btn { font-family: var(--sans); font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #000; }
    .btn-ghost   { background: var(--surface2); color: var(--ink); border: 1px solid var(--border); }
    .btn-danger  { background: #21262d; color: var(--red); border: 1px solid #3a1c1c; }

    #statusBar { font-family: var(--mono); font-size: 11px; padding: 6px 16px; background: var(--blue-dim); color: var(--blue); border-bottom: 1px solid #1a3a5c; }
    #statusBar.ok { background: #1a3a22; color: var(--green); }
    #statusBar.error { background: #3a1212; color: var(--red); }
    #statusBar.warn { background: #3a2d05; color: #d29922; }

    #controlBar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 15px; align-items: center; }
    .select-group { display: flex; align-items: center; gap: 8px; flex: 1; }
    label { font-size: 11px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    select { font-family: var(--mono); font-size: 12px; background: var(--surface2); color: var(--ink); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; width: 100%; outline: none; }

    main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    
    .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 100%; }
    @media (max-width: 1200px) { .filter-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .filter-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .filter-grid { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .panel h3 { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 2px; }
    
    .panel-header-dynamic { display: flex; flex-direction: column; gap: 6px; margin-bottom: 2px; }
    
    .filter-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; height: 160px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .filter-item { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; cursor: pointer; padding: 4px; }
    .filter-item input { cursor: pointer; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>BIM Avansert Filtrering v4.6</h1>
    <p>Ekte hierarki-arv og standard skjule-API</p>
  </div>
  <button class="btn btn-ghost" id="btnLoad" disabled>Hent modeller</button>
  <button class="btn btn-primary" id="btnFilter" disabled>🔍 Filtrer i 3D</button>
  <button class="btn btn-danger" id="btnReset" disabled>↺ Vis alle</button>
</header>

<div id="statusBar">Kobler til Trimble Connect...</div>

<div id="controlBar">
  <div class="select-group">
    <label>Velg kilde/modell:</label>
    <select id="modelSelect" disabled><option value="">– Laster... –</option></select>
  </div>
</div>

<main id="mainContent">
  <div class="filter-grid" id="filterGrid" style="display: none;">
    <div class="panel"><h3>MMI-nivå</h3><div class="filter-box" id="box_MMI"></div></div>
    <div class="panel"><h3>Underdisiplin</h3><div class="filter-box" id="box_Underdisiplin"></div></div>
    <div class="panel"><h3>PNS Kode</h3><div class="filter-box" id="box_PNS Kode"></div></div>
    <div class="panel"><h3>Bruksstatus</h3><div class="filter-box" id="box_Bruksstatus"></div></div>
    <div class="panel"><h3>Objektklasse</h3><div class="filter-box" id="box_Objektklasse"></div></div>
    <div class="panel"><h3>Objekttype</h3><div class="filter-box" id="box_Objekttype"></div></div>
    <div class="panel"><h3>Materiale</h3><div class="filter-box" id="box_Materiale"></div></div>
    
    <div class="panel" style="border-color: var(--blue);">
      <div class="panel-header-dynamic">
        <h3 style="color: var(--ink);">Valgfri egenskap:</h3>
        <select id="dynamicPropSelect"><option value="">-- Velg egenskap --</option></select>
      </div>
      <div class="filter-box" id="box_dynamic">
        <div style="color: var(--muted); font-size: 11px; padding:4px;">Velg egenskap over</div>
      </div>
    </div>
  </div>
  
  <div class="empty" id="emptyState">Last inn modeller og analyser egenskaper for å starte.</div>
</main>

<script>
let API = null;
let allModels = [];
let modelObjectsData = []; 
let allDiscoveredProperties = new Set(); 

const FIXED_PROPS = ["MMI", "Underdisiplin", "PNS Kode", "Bruksstatus", "Objektklasse", "Objekttype", "Materiale"];
const IGNORE = new Set(['IFCPROJECT','IFCSITE','IFCBUILDING','IFCBUILDINGSTOREY']);
const API_CHUNK_LIMIT = 2000; // Optimal pakke-størrelse for 3D-motoren

const $ = id => document.getElementById(id);
const setStatus = (m, c='') => { $('statusBar').textContent = m; $('statusBar').className = c; };
const lastPathPart = (v) => (v || '').split('/').pop().split('\\').pop();

function getIfcType(obj){
    const s = (obj.class || obj.className || obj.type || obj.ifcType || obj.ifcEntity || '').toString().trim().toUpperCase();
    if (s && s.startsWith('IFC')) return s;
    for (const ps of (obj.properties || [])) {
        for (const p of (ps.properties || [])) {
            const v = (p.value || '').toString().trim().toUpperCase();
            if (v.startsWith('IFC')) return v;
        }
    }
    return '';
}

async function connect(){
  try {
    API = await window.TrimbleConnectWorkspace.connect(window.parent);
    $('btnLoad').disabled = false;
    setStatus('✅ Tilkoblet Trimble Connect. Husk å slå AV "Spøkelsesmodus" i 3D-innstillingene!', 'warn');
  } catch(e) { setStatus('❌ Kunne ikke koble til API.', 'error'); }
}

async function loadModels(){
  if (!API) return;
  setStatus('⏳ Henter modellnavn og 3D-objekter...');
  try {
    const nameMap = new Map();
    try {
      const resModels = await API.models.getModels();
      const list = Array.isArray(resModels) ? resModels : (resModels?.models || resModels?.items || []);
      list.forEach(m => {
        const id = m.id || m.modelId;
        const fn = [m.name, m.fileName, m.filename].find(v => /\.ifc/i.test(v)) || m.name;
        if (id && fn) nameMap.set(id, lastPathPart(fn));
      });
    } catch(e) { console.warn("Kunne ikke hente filnavn:", e); }

    const objs = await API.viewer.getObjects();
    allModels = (objs || []).map(m => {
      const mid = m.modelId || m.modelid;
      return {
        id: mid,
        name: nameMap.get(mid) || m.modelName || m.name || 'Navnløs modell',
        rawObjects: m.objects || [],
        objectIds: (m.objects || []).map(o => o.id || o.objectRuntimeId).filter(id => id != null)
      };
    }).filter(m => m.objectIds.length > 0);

    if (allModels.length === 0) {
      setStatus('⚠️ Ingen objekter funnet i modellene.', 'error');
      return;
    }

    let optionsHtml = `
      <option value="ALL_MODELS">🌍 Alle modeller (${allModels.reduce((acc, m) => acc + m.objectIds.length, 0)} obj)</option>
      <option value="SELECTED_OBJECTS">🎯 Valgte objekter (krever markering i 3D)</option>
    `;
    allModels.forEach(m => {
      optionsHtml += `<option value="${m.id}">📦 ${m.name} (${m.objectIds.length} obj)</option>`;
    });

    $('modelSelect').innerHTML = optionsHtml;
    $('modelSelect').disabled = false;
    
    await analyzeModelProperties();
  } catch(e) { setStatus('❌ Feil ved henting av modeller: ' + e.message, 'error'); }
}

// Henter alle IDs flatt ut
function getAllRuntimeIds(obj) {
  let ids = [];
  const mainId = obj.id || obj.objectRuntimeId;
  if (mainId != null) ids.push(mainId);
  if (obj.objects && Array.isArray(obj.objects)) {
    obj.objects.forEach(child => { ids = ids.concat(getAllRuntimeIds(child)); });
  }
  return ids;
}

// NY FUNKSJON: Bygger et ekte, rekursivt kart over hvem som er forelder til hvem!
function buildHierarchyMap(obj, parentId = null, map) {
  const currentId = obj.id || obj.objectRuntimeId;
  if (parentId != null && currentId != null) {
      map.set(currentId, parentId);
  }
  if (obj.objects && Array.isArray(obj.objects)) {
      obj.objects.forEach(child => buildHierarchyMap(child, currentId, map));
  }
}

async function analyzeModelProperties() {
  const mode = $('modelSelect').value;
  if (!mode) return;

  modelObjectsData = [];
  allDiscoveredProperties.clear();
  let chunksToProcess = [];

  setStatus('⏳ Forbereder analyse...');

  if (mode === "SELECTED_OBJECTS") {
    const selection = await API.viewer.getSelection();
    if (!selection || selection.length === 0) {
      setStatus('⚠️ Ingen objekter er valgt i 3D-vieweren.', 'error');
      $('filterGrid').style.display = 'none';
      $('emptyState').style.display = 'block';
      return;
    }
    selection.forEach(sel => {
      const mid = sel.modelId || sel.modelid;
      const ids = (sel.objectIds || sel.objectRuntimeIds || []);
      if (mid && ids.length > 0) {
        let allExpandedIds = [...ids];
        const targetModel = allModels.find(m => m.id === mid);
        if (targetModel) {
          targetModel.rawObjects.forEach(rawO => {
            const rId = rawO.id || rawO.objectRuntimeId;
            if (ids.includes(rId)) { allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO)); }
          });
        }
        chunksToProcess.push({ modelId: mid, objectIds: Array.from(new Set(allExpandedIds)) });
      }
    });
  } else if (mode === "ALL_MODELS") {
    allModels.forEach(m => {
      let allExpandedIds = [];
      m.rawObjects.forEach(rawO => { allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO)); });
      chunksToProcess.push({ modelId: m.id, objectIds: Array.from(new Set(allExpandedIds)) });
    });
  } else {
    const targetModel = allModels.find(m => m.id === mode);
    if (targetModel) {
      let allExpandedIds = [];
      targetModel.rawObjects.forEach(rawO => { allExpandedIds = allExpandedIds.concat(getAllRuntimeIds(rawO)); });
      chunksToProcess.push({ modelId: targetModel.id, objectIds: Array.from(new Set(allExpandedIds)) });
    }
  }

  const CHUNK_SIZE = 200;
  let totalObjectsCount = chunksToProcess.reduce((acc, c) => acc + c.objectIds.length, 0);
  let processedCount = 0;

  for (const chunkGroup of chunksToProcess) {
    const mid = chunkGroup.modelId;
    const ids = chunkGroup.objectIds;

    // Bygg det ekte hierarkiet
    const childToParentMap = new Map();
    const targetModel = allModels.find(m => m.id === mid);
    if (targetModel) {
      targetModel.rawObjects.forEach(rawO => buildHierarchyMap(rawO, null, childToParentMap));
    }

    const tempObjectsDataMap = new Map();
    ids.forEach(id => {
      tempObjectsDataMap.set(id, {
         modelId: mid,
         runtimeId: id,
         isIgnored: false,
         props: {}
      });
    });

    for (let i = 0; i < ids.length; i += CHUNK_SIZE) {
      const currentBatch = ids.slice(i, i + CHUNK_SIZE);
      const propsArr = await API.viewer.getObjectProperties(mid, currentBatch);
      
      propsArr.forEach(o => {
        const rId = o.id || o.objectRuntimeId;
        if(tempObjectsDataMap.has(rId)) {
          const objData = tempObjectsDataMap.get(rId);
          objData.isIgnored = IGNORE.has(getIfcType(o));
          
          (o.properties || []).forEach(g => {
            (g.properties || []).forEach(p => {
              const val = p.value ? p.value.toString().trim() : "";
              if (val) {
                objData.props[p.name.trim()] = val;
                if (!objData.isIgnored) allDiscoveredProperties.add(p.name.trim());
              }
            });
          });
        }
      });

      processedCount += currentBatch.length;
      setStatus(`⏳ Skanner egenskaper... ${processedCount} / ${totalObjectsCount}`);
    }
    
    // NY ARVELOGIKK: Klatrer oppover det ekte hierarkiet
    tempObjectsDataMap.forEach((obj, runtimeId) => {
      let currentParentId = childToParentMap.get(runtimeId);
      let depth = 0;
      
      while (currentParentId != null && tempObjectsDataMap.has(currentParentId) && depth < 10) {
        const parentObj = tempObjectsDataMap.get(currentParentId);
        for (const key in parentObj.props) {
          if (!obj.props[key]) { 
            obj.props[key] = parentObj.props[key];
          }
        }
        currentParentId = childToParentMap.get(currentParentId);
        depth++;
      }

      if (!obj.isIgnored) {
        modelObjectsData.push(obj);
      }
    });
  }

  renderFixedPanels();
  populateDynamicDropdown();
  
  $('filterGrid').style.display = 'grid';
  $('emptyState').style.display = 'none';
  $('btnFilter').disabled = false;
  $('btnReset').disabled = false;
  setStatus(`✅ Analyse ferdig. Hentet data for ${modelObjectsData.length} geometri-noder.`, 'ok');
}

function renderFixedPanels() {
  FIXED_PROPS.forEach(propName => {
    const uniqueValues = new Set();
    modelObjectsData.forEach(obj => {
      uniqueValues.add(obj.props[propName] || "Mangler verdi");
    });
    renderFilterBox(`box_${propName}`, Array.from(uniqueValues).sort((a,b) => a.localeCompare(b, 'no', {sensitivity: 'base'})), propName);
  });
}

function populateDynamicDropdown() {
  const select = $('dynamicPropSelect');
  const dynamicOptions = Array.from(allDiscoveredProperties)
                              .filter(p => !FIXED_PROPS.includes(p))
                              .sort((a,b) => a.localeCompare(b, 'no', {sensitivity: 'base'}));
  
  select.innerHTML = '<option value="">-- Velg egenskap --</option>' + 
                     dynamicOptions.map(p => `<option value="${p}">${p}</option>`).join('');
                     
  $('box_dynamic').innerHTML = '<div style="color: var(--muted); font-size: 11px; padding:4px;">Velg egenskap over</div>';
}

$('dynamicPropSelect').onchange = (e) => {
  const propName = e.target.value;
  if (!propName) {
    $('box_dynamic').innerHTML = '<div style="color: var(--muted); font-size: 11px; padding:4px;">Velg egenskap over</div>';
    return;
  }

  const uniqueValues = new Set();
  modelObjectsData.forEach(obj => {
    uniqueValues.add(obj.props[propName] || "Mangler verdi");
  });

  renderFilterBox('box_dynamic', Array.from(uniqueValues).sort((a,b) => a.localeCompare(b, 'no', {sensitivity: 'base'})), propName);
};

function renderFilterBox(elementId, values, categoryKey) {
  const box = $(elementId);
  if(values.length === 0) {
    box.innerHTML = '<div style="color: var(--muted); font-size: 11px; padding:4px;">Ingen verdier funnet</div>';
    return;
  }

  box.innerHTML = values.map(val => `
    <label class="filter-item">
      <input type="checkbox" value="${val}" data-cat="${categoryKey}" class="filter-checkbox">
      <span>${val}</span>
    </label>
  `).join('');
}

async function executeFilter() {
  if (!API || !modelObjectsData.length) return;
  
  const activeFilters = {};
  document.querySelectorAll('.filter-checkbox:checked').forEach(cb => {
    const cat = cb.getAttribute('data-cat');
    if (!activeFilters[cat]) activeFilters[cat] = new Set();
    activeFilters[cat].add(cb.value);
  });

  const activeCategories = Object.keys(activeFilters);
  const visibilityMap = {};

  modelObjectsData.forEach(obj => {
    if (!visibilityMap[obj.modelId]) visibilityMap[obj.modelId] = { show: [], hide: [] };

    let matchesAll = true;
    for (const cat of activeCategories) {
      const objVal = obj.props[cat] || "Mangler verdi";
      if (!activeFilters[cat].has(objVal)) {
        matchesAll = false;
        break; 
      }
    }

    if (activeCategories.length === 0 || matchesAll) {
      visibilityMap[obj.modelId].show.push(obj.runtimeId);
    } else {
      visibilityMap[obj.modelId].hide.push(obj.runtimeId);
    }
  });

  try {
    setStatus('⏳ Oppdaterer 3D-visning...');
    let hiddenTotal = 0; let shownTotal = 0;

    for (const mid of Object.keys(visibilityMap)) {
      const { show, hide } = visibilityMap[mid];

      // BRUKER NÅ { hidden: true/false } SOM ER DEN ENESIKE OFFISIELLE API-KOMMANDOEN!
      if (hide.length > 0) {
        for (let i = 0; i < hide.length; i += API_CHUNK_LIMIT) {
          const chunk = hide.slice(i, i + API_CHUNK_LIMIT);
          await API.viewer.setObjectState({ modelObjectIds: [{ modelId: mid, objectRuntimeIds: chunk }] }, { hidden: true });
        }
        hiddenTotal += hide.length;
      }
      
      if (show.length > 0) {
        for (let i = 0; i < show.length; i += API_CHUNK_LIMIT) {
          const chunk = show.slice(i, i + API_CHUNK_LIMIT);
          await API.viewer.setObjectState({ modelObjectIds: [{ modelId: mid, objectRuntimeIds: chunk }] }, { hidden: false });
        }
        shownTotal += show.length;
      }
    }

    if (API.viewer.refresh) try { await API.viewer.refresh(); } catch(e){}
    setStatus(`✅ Filtrering fullført. Viser ${shownTotal} noder, skjulte ${hiddenTotal}.`, 'ok');
  } catch (e) {
    setStatus('❌ Feil under filtrering: ' + e.message, 'error');
  }
}

async function resetFilter() {
  if (!API || !modelObjectsData.length) return;

  try {
    setStatus('⏳ Nullstiller visning...');
    const modelsToReset = {};
    modelObjectsData.forEach(obj => {
      if (!modelsToReset[obj.modelId]) modelsToReset[obj.modelId] = [];
      modelsToReset[obj.modelId].push(obj.runtimeId);
    });

    for (const mid of Object.keys(modelsToReset)) {
      if (modelsToReset[mid].length > 0) {
        const allIds = modelsToReset[mid];
        for (let i = 0; i < allIds.length; i += API_CHUNK_LIMIT) {
          const chunk = allIds.slice(i, i + API_CHUNK_LIMIT);
          await API.viewer.setObjectState({ modelObjectIds: [{ modelId: mid, objectRuntimeIds: chunk }] }, { hidden: false });
        }
      }
    }

    if (API.viewer.refresh) try { await API.viewer.refresh(); } catch(e){}
    
    document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
    setStatus('✅ Filter opphevet. Hele modellen er synlig.', 'ok');
  } catch (e) {
    setStatus('❌ Feil ved nullstilling: ' + e.message, 'error');
  }
}

$('btnLoad').onclick = loadModels;
$('modelSelect').onchange = analyzeModelProperties;
$('btnFilter').onclick = executeFilter;
$('btnReset').onclick = resetFilter;

connect();
</script>
</body>
</html>
